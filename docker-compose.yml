version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aurum_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env.production
    environment:
      - DOCKER_ENV=1

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aurum_frontend
    restart: unless-stopped
    ports:
      - "8001:80"
    depends_on:
      - backend
